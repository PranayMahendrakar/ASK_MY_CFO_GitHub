name: Run Pipeline

on:
  push:
      paths:
            - 'ask_cfo_gh/input/**.pdf'

              workflow_dispatch:
                  inputs:
                        skip_stage1:
                                description: 'Skip Stage 1 (page detection)'
                                        required: false
                                                type: boolean
                                                        default: false

                                                        jobs:
                                                          process:
                                                              runs-on: ubuntu-latest
                                                                  timeout-minutes: 30

                                                                      steps:
                                                                            - name: Checkout repo
                                                                                    uses: actions/checkout@v4

                                                                                          - name: Setup Python
                                                                                                  uses: actions/setup-python@v5
                                                                                                          with:
                                                                                                                    python-version: '3.12'
                                                                                                                              cache: 'pip'
                                                                                                                              
                                                                                                                                    - name: Install dependencies
                                                                                                                                            run: pip install -r ask_cfo_gh/requirements.txt
                                                                                                                                            
                                                                                                                                                  - name: List input PDFs
                                                                                                                                                          run: |
                                                                                                                                                                    echo "PDFs in ask_cfo_gh/input/:"
                                                                                                                                                                              ls -lh ask_cfo_gh/input/*.pdf 2>/dev/null || echo " (none)"
                                                                                                                                                                              
                                                                                                                                                                                    - name: Run pipeline
                                                                                                                                                                                            env:
                                                                                                                                                                                                      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                        python ask_cfo_gh/run_pipeline.py \
                                                                                                                                                                                                                                    --input ask_cfo_gh/input \
                                                                                                                                                                                                                                                --output ask_cfo_gh/output \
                                                                                                                                                                                                                                                            --api-key "$OPENAI_API_KEY"
                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                  - name: List outputs
                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                    echo "Files in ask_cfo_gh/output/:"
                                                                                                                                                                                                                                                                                              ls -lh ask_cfo_gh/output/ 2>/dev/null || echo " (none)"
                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                    - name: Upload outputs as artifact
                                                                                                                                                                                                                                                                                                            uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                              name: pipeline-output-${{ github.run_number }}
                                                                                                                                                                                                                                                                                                                                        path: ask_cfo_gh/output/
                                                                                                                                                                                                                                                                                                                                                  retention-days: 90
                                                                                                                                                                                                                                                                                                                                                            if-no-files-found: warn
                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                  - name: Summary
                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                    echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                              echo "" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                        echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                  echo "|------|------|" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                            for f in ask_cfo_gh/output/*; do
                                                                                                                                                                                                                                                                                                                                                                                                                                        if [ -f "$f" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                      size=$(du -h "$f" | cut -f1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "| $(basename $f) | $size |" >> $GITHUB_STEP_SUMMARY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          done
